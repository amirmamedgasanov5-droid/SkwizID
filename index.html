<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skwiz ID</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .apple-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01), 0 2px 4px -1px rgba(0, 0, 0, 0.006);
        }
        .btn-apple {
            background-color: #0071e3;
            color: white;
            transition: all 0.2s ease;
        }
        .btn-apple:hover { background-color: #0077ed; opacity: 0.9; }
        .input-minimal {
            background: #ffffff;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            transition: border-color 0.2s ease;
        }
        .input-minimal:focus { border-color: #0071e3; outline: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const firebaseConfig = {
            projectId: "gen-lang-client-0708720332",
            apiKey: "AIzaSyAzeW2c29p8vOyxHpWjgJ4s2_k8zHytrhI",
            authDomain: "gen-lang-client-0708720332.firebaseapp.com",
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect, createContext, useContext } = React;
        const AuthContext = createContext(null);

        const App = () => {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('profile'); // profile, apps

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    setUser(u);
                    if (u) {
                        const snap = await db.collection('users').doc(u.uid).get();
                        if (snap.exists) {
                            setProfile(snap.data());
                        } else {
                            const p = { uid: u.uid, email: u.email, name: u.displayName, photo: u.photoURL, isDev: u.email === 'a84896513@gmail.com' };
                            await db.collection('users').doc(u.uid).set(p);
                            setProfile(p);
                        }
                    }
                    setLoading(false);
                });
                return unsub;
            }, []);

            useEffect(() => { lucide.createIcons(); }, [view, user, loading]);

            if (loading) return <div className="h-screen flex items-center justify-center text-sm font-medium text-gray-400">Loading...</div>;

            if (!user) return (
                <div className="h-screen flex items-center justify-center px-4 bg-white">
                    <div className="max-w-sm w-full text-center space-y-8">
                        <div className="space-y-3">
                            <h1 className="text-3xl font-bold tracking-tight text-gray-900">Sign in to Skwiz</h1>
                            <p className="text-gray-500 text-sm">One account for all Skwiz services.</p>
                        </div>
                        <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="w-full btn-apple py-3 rounded-lg font-semibold shadow-sm flex items-center justify-center gap-3">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5 bg-white rounded-full p-0.5" />
                            Continue with Google
                        </button>
                    </div>
                </div>
            );

            return (
                <AuthContext.Provider value={{ user, profile, view, setView }}>
                    <div className="min-h-screen flex flex-col">
                        <header className="h-16 bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 px-6 flex items-center justify-between">
                            <div className="flex items-center gap-8">
                                <div className="text-lg font-bold tracking-tight text-black flex items-center gap-2">
                                    <div className="w-6 h-6 bg-black rounded flex items-center justify-center text-white text-[10px]">S</div>
                                    Skwiz ID
                                </div>
                                <nav className="hidden md:flex items-center gap-6">
                                    <button onClick={() => setView('profile')} className={`text-sm font-medium ${view === 'profile' ? 'text-black' : 'text-gray-400 hover:text-gray-600'}`}>Account</button>
                                    {profile?.isDev && <button onClick={() => setView('apps')} className={`text-sm font-medium ${view === 'apps' ? 'text-black' : 'text-gray-400 hover:text-gray-600'}`}>Developer</button>}
                                </nav>
                            </div>
                            <div className="flex items-center gap-4">
                                <img src={user.photoURL} className="w-8 h-8 rounded-full border border-gray-200" />
                                <button onClick={() => auth.signOut()} className="text-gray-400 hover:text-black transition-colors"><i data-lucide="log-out" className="w-4 h-4"></i></button>
                            </div>
                        </header>

                        <main className="max-w-4xl w-full mx-auto py-12 px-6">
                            {view === 'profile' ? <Profile /> : <Apps />}
                        </main>
                    </div>
                </AuthContext.Provider>
            );
        };

        const Profile = () => {
            const { profile, user } = useContext(AuthContext);
            return (
                <div className="space-y-10 animate-in fade-in duration-500">
                    <div className="space-y-2">
                        <h2 className="text-4xl font-bold tracking-tight">Personal Information</h2>
                        <p className="text-gray-500">Basic info, like your name and photo, used across Skwiz platforms.</p>
                    </div>
                    
                    <div className="apple-card rounded-2xl overflow-hidden">
                        <ProfileRow label="Photo" value={<img src={user.photoURL} className="w-12 h-12 rounded-full" />} />
                        <ProfileRow label="Name" value={profile?.name} />
                        <ProfileRow label="Email" value={profile?.email} />
                        <ProfileRow label="Developer Status" value={profile?.isDev ? 'Enabled' : 'Standard User'} last />
                    </div>

                    <div className="grid md:grid-cols-2 gap-6 pt-6">
                        <div className="apple-card p-8 rounded-2xl space-y-4">
                            <i data-lucide="shield-check" className="text-blue-500 w-8 h-8"></i>
                            <h3 className="text-xl font-bold">Privacy & Security</h3>
                            <p className="text-sm text-gray-500 leading-relaxed">Your data is encrypted by default. We never share your personal information with third parties without your consent.</p>
                        </div>
                        <div className="apple-card p-8 rounded-2xl space-y-4">
                            <i data-lucide="key" className="text-blue-500 w-8 h-8"></i>
                            <h3 className="text-xl font-bold">Two-Factor Authentication</h3>
                            <p className="text-sm text-gray-500 leading-relaxed">Add an extra layer of security to your account. Choose between SMS verification or a hardware key.</p>
                        </div>
                    </div>
                </div>
            );
        };

        const ProfileRow = ({ label, value, last }) => (
            <div className={`px-8 py-6 flex items-center justify-between ${!last ? 'border-b border-gray-50' : ''}`}>
                <span className="text-xs font-semibold uppercase tracking-wider text-gray-400">{label}</span>
                <span className="text-sm font-medium text-gray-900">{value}</span>
            </div>
        );

        const Apps = () => {
            const { user } = useContext(AuthContext);
            const [apps, setApps] = useState([]);
            const [name, setName] = useState('');

            useEffect(() => {
                db.collection('apps').where('ownerId', '==', user.uid).onSnapshot(s => setApps(s.docs.map(d => d.data())));
            }, []);

            const add = async () => {
                if(!name) return;
                const id = 'skw_' + Math.random().toString(36).substr(2, 9);
                await db.collection('apps').doc(id).set({ id, name, ownerId: user.uid });
                setName('');
            };

            return (
                <div className="space-y-12 animate-in fade-in duration-500">
                    <div className="flex items-end justify-between">
                        <div className="space-y-2">
                            <h2 className="text-4xl font-bold tracking-tight">Developer Projects</h2>
                            <p className="text-gray-500">Manage your applications and API credentials.</p>
                        </div>
                    </div>

                    <div className="apple-card p-8 rounded-2xl space-y-6">
                        <h3 className="text-sm font-bold uppercase tracking-widest text-gray-400">Register New Project</h3>
                        <div className="flex gap-4">
                            <input value={name} onChange={e => setName(e.target.value)} placeholder="App display name" className="flex-1 input-minimal px-4" />
                            <button onClick={add} className="btn-apple px-8 py-2 rounded-lg font-bold">Create</button>
                        </div>
                    </div>

                    <div className="grid gap-4">
                        {apps.map(app => (
                            <div key={app.id} className="apple-card p-6 rounded-2xl flex items-center justify-between hover:bg-gray-50 transition-colors">
                                <div className="space-y-1">
                                    <h4 className="font-bold text-lg text-gray-900">{app.name}</h4>
                                    <p className="text-xs font-mono text-blue-500">{app.id}</p>
                                </div>
                                <div className="flex gap-2">
                                    <button className="p-2 text-gray-400 hover:text-black transition-colors"><i data-lucide="settings" className="w-4 h-4"></i></button>
                                    <button className="p-2 text-gray-400 hover:text-black transition-colors"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                </div>
                            </div>
                        ))}
                        {apps.length === 0 && <div className="py-20 text-center text-gray-300 font-medium">No projects registered yet.</div>}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
