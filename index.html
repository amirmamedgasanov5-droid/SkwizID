<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skwiz ID | Unified Identity</title>
    
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --color-skwiz-bg: #050505;
            --color-skwiz-sidebar: #0a0a0a;
            --color-skwiz-card: #0d0d0d;
            --color-skwiz-border: #1a1a1a;
            --color-skwiz-accent: #4f46e5;
            --color-skwiz-emerald: #10b981;
            --color-skwiz-text: #d4d4d8;
            --color-skwiz-muted: #52525b;
        }

        body {
            background-color: var(--color-skwiz-bg);
            color: var(--color-skwiz-text);
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            margin: 0;
            overflow: hidden;
        }

        .glass {
            background: var(--color-skwiz-card);
            border: 1px solid var(--color-skwiz-border);
        }

        .btn-primary {
            background-color: var(--color-skwiz-accent);
            color: white;
            font-weight: 600;
            padding: 0.5rem 1.5rem;
            border-radius: 0.375rem;
            transition: all 0.2s;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:active { transform: scale(0.95); }

        .input-skwiz {
            background-color: black;
            border: 1px solid var(--color-skwiz-border);
            border-radius: 0.25rem;
            padding: 0.5rem 1rem;
            outline: none;
            transition: all 0.2s;
            color: white;
            font-size: 0.875rem;
            width: 100%;
        }

        .input-skwiz:focus { border-color: var(--color-skwiz-accent); }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            color: var(--color-skwiz-muted);
            font-size: 0.875rem;
            width: 100%;
            text-align: left;
        }

        .nav-link:hover { background-color: rgba(255, 255, 255, 0.05); color: white; }

        .nav-link-active {
            background-color: rgba(79, 70, 229, 0.1);
            color: var(--color-skwiz-accent);
            border: 1px solid rgba(79, 70, 229, 0.2);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase Compat SDKs (easier for single-file browser usage) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        // Firebase Configuration
        const firebaseConfig = {
            projectId: "gen-lang-client-0708720332",
            apiKey: "AIzaSyAzeW2c29p8vOyxHpWjgJ4s2_k8zHytrhI",
            authDomain: "gen-lang-client-0708720332.firebaseapp.com",
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const { useState, useEffect, createContext, useContext } = React;

        const AuthContext = createContext(null);

        const App = () => {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [currentView, setCurrentView] = useState('dashboard'); // dashboard, dev, docs

            useEffect(() => {
                return auth.onAuthStateChanged(async (u) => {
                    setUser(u);
                    if (u) {
                        const docRef = db.collection('users').doc(u.uid);
                        const docSnap = await docRef.get();
                        
                        if (docSnap.exists) {
                            setProfile(docSnap.data());
                        } else {
                            const isDev = u.email === 'a84896513@gmail.com';
                            const newProfile = {
                                uid: u.uid,
                                email: u.email || '',
                                displayName: u.displayName || 'Unnamed Skwiz',
                                photoURL: u.photoURL || '',
                                isDeveloper: isDev,
                                mfaEnabled: false,
                                createdAt: new Date().toISOString()
                            };
                            await docRef.set(newProfile);
                            setProfile(newProfile);
                        }
                    } else {
                        setProfile(null);
                    }
                    setLoading(false);
                });
            }, []);

            const login = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                } catch (error) {
                    console.error("Login failed", error);
                }
            };

            const logout = async () => {
                await auth.signOut();
            };

            if (loading) {
                return (
                    <div className="h-screen w-screen flex items-center justify-center bg-[#050505] text-[#4f46e5] font-mono tracking-widest text-sm">
                        INITIALIZING_CORE_SYSTEM...
                    </div>
                );
            }

            if (!user) {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center bg-[#050505] p-4">
                        <div className="max-w-md w-full glass p-12 rounded-2xl text-center space-y-10 border-[#1a1a1a] shadow-2xl">
                            <div className="space-y-4">
                                <div className="w-16 h-16 bg-[#4f46e5] rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-[#4f46e5]/40 text-white">
                                    <i data-lucide="shield" size="32"></i>
                                </div>
                                <div>
                                    <h1 className="text-3xl font-bold tracking-tight text-white mb-2">SKWIZ ID</h1>
                                    <p className="text-[#52525b] text-sm">Unified identity protocol for the ecosystem</p>
                                </div>
                            </div>
                            <button 
                                onClick={login}
                                className="w-full bg-white text-black font-bold py-3.5 px-6 rounded hover:bg-zinc-200 transition-all active:scale-95 flex items-center justify-center gap-3 shadow-xl"
                            >
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" />
                                Sign in with Google
                            </button>
                            <div className="flex items-center gap-4 text-[10px] text-[#52525b] uppercase tracking-[0.2em] justify-center before:h-[1px] before:flex-1 before:bg-zinc-800 after:h-[1px] after:flex-1 after:bg-zinc-800">
                                System Gate
                            </div>
                            <p className="text-[10px] text-[#52525b] leading-relaxed uppercase">
                                By continuing, you agree to the Skwiz security protocols.
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <AuthContext.Provider value={{ user, profile, login, logout, currentView, setCurrentView }}>
                    <div className="flex h-screen w-screen overflow-hidden bg-[#050505]">
                        <Sidebar />
                        <main className="flex-1 flex flex-col overflow-y-auto">
                            <Header title={getHeaderTitle(currentView)} />
                            <div className="p-10">
                                {currentView === 'dashboard' && <Dashboard />}
                                {currentView === 'dev' && <DevConsole />}
                                {currentView === 'docs' && <Docs />}
                            </div>
                        </main>
                    </div>
                </AuthContext.Provider>
            );
        };

        const getHeaderTitle = (view) => {
            switch(view) {
                case 'dashboard': return 'Security Dashboard';
                case 'dev': return 'Developer Console';
                case 'docs': return 'Protocol Documentation';
                default: return 'Skwiz ID';
            }
        }

        const Sidebar = () => {
            const { profile, logout, currentView, setCurrentView } = useContext(AuthContext);

            return (
                <aside className="w-64 bg-[#0a0a0a] border-r border-[#1a1a1a] flex flex-col h-screen overflow-y-auto shrink-0">
                    <div className="p-8 flex items-center gap-3 cursor-pointer" onClick={() => setCurrentView('dashboard')}>
                        <div className="w-8 h-8 bg-[#4f46e5] rounded flex items-center justify-center font-bold text-white shadow-lg">S</div>
                        <span className="text-xl font-semibold tracking-tight text-white">SKWIZ <span className="text-[#4f46e5]">ID</span></span>
                    </div>

                    <nav className="flex-1 px-4 py-4 space-y-1">
                        <div className="px-4 py-2 text-[10px] uppercase tracking-widest text-[#52525b] font-bold">Main Identity</div>
                        
                        <NavButton icon="user" label="Account" active={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                        
                        {profile?.isDeveloper && (
                            <div className="mt-6">
                                <div className="px-4 py-2 text-[10px] uppercase tracking-widest text-[#52525b] font-bold">Developer tools</div>
                                <NavButton icon="terminal" label="Console" active={currentView === 'dev'} onClick={() => setCurrentView('dev')} />
                            </div>
                        )}

                        <div className="mt-6">
                            <div className="px-4 py-2 text-[10px] uppercase tracking-widest text-[#52525b] font-bold">Resources</div>
                            <NavButton icon="book-open" label="Documentation" active={currentView === 'docs'} onClick={() => setCurrentView('docs')} />
                        </div>
                    </nav>

                    <div className="p-6 border-t border-[#1a1a1a] mt-auto">
                        <div className="flex items-center gap-3 p-2 bg-black/20 rounded-lg">
                            <div className="w-10 h-10 rounded-full bg-zinc-800 border border-zinc-700 overflow-hidden shrink-0">
                                <img src={profile?.photoURL} className="w-full h-full object-cover" />
                            </div>
                            <div className="flex flex-col min-w-0">
                                <span className="text-sm font-medium text-white truncate">{profile?.displayName}</span>
                                {profile?.isDeveloper && (
                                    <span className="text-[10px] text-[#10b981] flex items-center gap-1 font-semibold uppercase tracking-tighter">
                                        Developer Active
                                    </span>
                                )}
                            </div>
                            <button onClick={logout} className="ml-auto text-[#52525b] hover:text-white transition-colors">
                                <i data-lucide="log-out" size="16"></i>
                            </button>
                        </div>
                    </div>
                </aside>
            );
        };

        const NavButton = ({ icon, label, active, onClick }) => (
            <button
                onClick={onClick}
                className={`nav-link ${active ? 'nav-link-active' : ''}`}
            >
                <i data-lucide={icon} size="18"></i>
                {label}
            </button>
        );

        const Header = ({ title }) => {
            const { profile } = useContext(AuthContext);
            return (
                <header className="h-20 border-b border-[#1a1a1a] flex items-center justify-between px-10 bg-[#050505]/80 backdrop-blur sticky top-0 z-40">
                    <h1 className="text-lg font-medium text-white tracking-tight">{title}</h1>
                    <div className="flex items-center gap-4">
                        <div className="bg-[#0d0d0d] border border-zinc-800 rounded-md px-3 py-1.5 text-xs flex items-center gap-2">
                            <span className="text-[#52525b]">Multi-Factor Auth:</span>
                            <span className={profile?.mfaEnabled ? "text-[#10b981] font-semibold" : "text-[#52525b]"}>
                                {profile?.mfaEnabled ? 'Enabled' : 'Disabled'}
                            </span>
                        </div>
                    </div>
                </header>
            );
        }

        const Dashboard = () => {
            const { profile } = useContext(AuthContext);
            return (
                <div className="grid grid-cols-12 gap-8">
                    <div className="col-span-4 space-y-6">
                        <div className="glass p-8 rounded-xl flex flex-col items-center space-y-6">
                            <div className="relative group">
                                <div className="w-32 h-32 rounded-full border-2 border-[#4f46e5]/30 p-1">
                                    <img src={profile?.photoURL} className="w-full h-full rounded-full object-cover grayscale brightness-75" />
                                </div>
                            </div>
                            <div className="text-center">
                                <h3 className="text-xl font-semibold text-white mb-1">{profile?.displayName}</h3>
                                <p className="text-xs text-[#52525b] font-mono">{profile?.email}</p>
                            </div>
                            <div className="flex items-center gap-2 px-3 py-1 bg-[#10b981]/10 text-[#10b981] text-[10px] font-bold uppercase rounded border border-[#10b981]/20">
                                <div className="w-1.5 h-1.5 bg-[#10b981] rounded-full"></div>
                                Verified Identity
                            </div>
                        </div>
                        <div className="glass p-6 rounded-xl space-y-4">
                            <h4 className="text-[10px] text-[#52525b] uppercase tracking-widest font-bold border-b border-zinc-800 pb-3 mb-4">Metadata</h4>
                            <div className="space-y-3 font-mono">
                                <MetaRow label="UID" value={profile?.uid.substring(0, 12) + '...'} />
                                <MetaRow label="Role" value={profile?.isDeveloper ? 'SKWIZ_DEV' : 'CORE_USER'} highlight={profile?.isDeveloper} />
                                <MetaRow label="Session" value="SECURE_GATE" />
                            </div>
                        </div>
                    </div>
                    <div className="col-span-8 space-y-8">
                        <div className="glass p-10 rounded-xl space-y-8 relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-[0.03] pointer-events-none text-[#4f46e5]">
                                <i data-lucide="shield" size="120"></i>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 bg-[#4f46e5]/10 rounded-lg flex items-center justify-center text-[#4f46e5]">
                                    <i data-lucide="settings" size="20"></i>
                                </div>
                                <div className="flex flex-col">
                                    <h3 className="text-lg font-bold text-white tracking-tight">Security Protocol</h3>
                                    <p className="text-xs text-[#52525b]">Configure multi-layered authentication access.</p>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-6">
                                <SecurityCard title="Phone 2FA" desc="Secure your terminal with SMS-based verification codes." action="Initialize Gateway" />
                                <SecurityCard title="Hardware Key" desc="FIDO2 and WebAuthn compatible security keys." action="Register Key" disabled />
                            </div>
                        </div>
                        <div className="glass p-8 rounded-xl space-y-6">
                            <h3 className="text-sm font-semibold text-white uppercase tracking-widest border-b border-zinc-800 pb-4">Activity Log</h3>
                            <div className="space-y-1">
                                <LogEntry event="LOGIN_SUCCESS" info="SYSTEM_M3_CHROME" time="Just Now" />
                                <LogEntry event="TOKEN_REFRESH" info="AUTO_GATE_V1" time="2h ago" />
                                <LogEntry event="IDENTITY_SYNC" info="CLOUD_NODE_01" time="Yesterday" />
                            </div>
                        </div>
                    </div>
                </div>
            )
        }

        const MetaRow = ({ label, value, highlight }) => (
            <div className="flex justify-between items-center text-[10px]">
                <span className="text-zinc-600">{label}:</span>
                <span className={highlight ? "text-[#4f46e5]" : "text-zinc-400"}>{value}</span>
            </div>
        );

        const SecurityCard = ({ title, desc, action, disabled }) => (
            <div className={`p-6 bg-black/40 rounded-lg border border-zinc-900 space-y-4 ${disabled ? 'opacity-40' : ''}`}>
                <div className="flex justify-between items-start">
                    <span className="text-xs font-bold text-white uppercase tracking-tighter">{title}</span>
                    <div className={`w-2 h-2 rounded-full ${disabled ? 'bg-zinc-800' : 'bg-[#4f46e5] animate-pulse shadow-lg shadow-[#4f46e5]/50'}`}></div>
                </div>
                <p className="text-[11px] text-[#52525b] leading-relaxed">{desc}</p>
                <button className={`text-[10px] font-bold uppercase ${disabled ? 'text-zinc-700 cursor-not-allowed' : 'text-[#4f46e5] hover:underline'}`} disabled={disabled}>{action}</button>
            </div>
        );

        const LogEntry = ({ event, info, time }) => (
            <div className="flex justify-between items-center py-3 border-b border-zinc-900/50 group">
                <div className="flex items-center gap-3">
                    <div className="w-1.5 h-1.5 bg-zinc-700 rounded-full group-hover:bg-[#4f46e5] transition-colors"></div>
                    <span className="text-[11px] font-mono font-bold text-zinc-400 group-hover:text-white transition-colors">{event}</span>
                </div>
                <div className="flex items-center gap-4 text-[10px] font-mono text-zinc-600">
                    <span>{info}</span>
                    <span className="w-20 text-right">{time}</span>
                </div>
            </div>
        );

        const DevConsole = () => {
            const { user } = useContext(AuthContext);
            const [apps, setApps] = useState([]);
            const [newAppName, setNewAppName] = useState('');
            const [isAdding, setIsAdding] = useState(false);

            useEffect(() => { fetchApps(); }, []);

            const fetchApps = async () => {
                if (!user) return;
                const snap = await db.collection('apps').where('ownerId', '==', user.uid).get();
                setApps(snap.docs.map(d => d.data()));
            };

            const handleAdd = async () => {
                if (!newAppName) return;
                const cid = 'skw_client_' + Math.random().toString(36).substring(2, 10);
                const newApp = { clientId: cid, name: newAppName, ownerId: user.uid, createdAt: new Date().toISOString() };
                await db.collection('apps').doc(cid).set(newApp);
                setApps([...apps, newApp]);
                setNewAppName('');
                setIsAdding(false);
            };

            return (
                <div className="space-y-10">
                    <div className="grid grid-cols-3 gap-6">
                        <StatsCard label="System Users" value="12,408" icon="users" />
                        <StatsCard label="Active Projects" value={apps.length} icon="cpu" />
                        <StatsCard label="API Throughput" value="2.4k/min" icon="activity" highlight />
                    </div>

                    <div className="grid grid-cols-12 gap-8">
                        <div className="col-span-8 space-y-6">
                            <div className="flex justify-between items-center border-b border-zinc-800 pb-4">
                                <h3 className="text-sm font-semibold text-white uppercase tracking-widest">Application Stack</h3>
                                <button onClick={() => setIsAdding(!isAdding)} className="bg-white text-black text-[10px] px-3 py-1 rounded font-bold uppercase hover:bg-zinc-200">New Service</button>
                            </div>

                            {isAdding && (
                                <div className="glass p-6 rounded-xl border-[#4f46e5]/30 space-y-4 animate-in fade-in slide-in-from-top-2">
                                    <input value={newAppName} onChange={e => setNewAppName(e.target.value)} placeholder="Project Name" className="input-skwiz" />
                                    <div className="flex gap-2">
                                        <button onClick={handleAdd} className="btn-primary w-full">Generate ID</button>
                                        <button onClick={() => setIsAdding(false)} className="px-4 py-2 text-xs font-bold text-zinc-500 uppercase">Discard</button>
                                    </div>
                                </div>
                            )}

                            <div className="space-y-4">
                                {apps.map(app => (
                                    <div key={app.clientId} className="bg-[#0d0d0d] border border-zinc-900 p-6 rounded-xl hover:border-[#4f46e5]/30 transition-all group">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 bg-zinc-900 border border-zinc-800 rounded flex items-center justify-center group-hover:bg-[#4f46e5]/10">
                                                <i data-lucide="cpu" size="20" className="group-hover:text-[#4f46e5]"></i>
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-white tracking-tight">{app.name}</h4>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <span className="font-mono text-[9px] text-[#4f46e5] px-2 py-0.5 bg-[#4f46e5]/10 rounded border border-[#4f46e5]/20">{app.clientId}</span>
                                                </div>
                                            </div>
                                            <div className="ml-auto text-emerald-500 text-[10px] font-bold uppercase bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/20">Active</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="col-span-4 space-y-8">
                             <div className="glass p-8 rounded-xl space-y-6">
                                <h3 className="text-xs font-bold text-white uppercase tracking-widest border-b border-zinc-800 pb-3">Directives</h3>
                                <div className="bg-black p-4 rounded-lg border border-zinc-900 font-mono text-[10px] leading-relaxed">
                                    <div className="text-zinc-600">// Identity Verification</div>
                                    <div className="text-zinc-300 mt-2">Authorization: <span className="text-[#10b981]">Bearer skwiz_[TOKEN]</span></div>
                                    <div className="text-zinc-300">Issuer: <span className="text-zinc-500">accounts.skwiz.site</span></div>
                                </div>
                                <p className="text-[11px] text-[#52525b] leading-relaxed">Encryption standards are enforced at all nodes. For support, contact Core.</p>
                             </div>
                        </div>
                    </div>
                </div>
            )
        }

        const StatsCard = ({ label, value, icon, highlight }) => (
            <div className="bg-[#0d0d0d] border border-zinc-900 p-6 rounded-xl relative overflow-hidden group transition-all hover:border-zinc-700">
                <div className="absolute -right-4 -bottom-4 opacity-[0.03] group-hover:scale-110 transition-transform">
                    <i data-lucide={icon} size="100"></i>
                </div>
                <div className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold mb-1">{label}</div>
                <div className="text-3xl font-light text-white tracking-tight font-mono">{value}</div>
                <div className="mt-4 flex items-center gap-2">
                    <div className="flex-1 h-0.5 bg-zinc-900 rounded-full overflow-hidden">
                        <div className={`h-full ${highlight ? 'bg-[#4f46e5]' : 'bg-[#10b981]'} w-[70%]`}></div>
                    </div>
                    <span className="text-[9px] text-zinc-600 font-mono">STATUS_OK</span>
                </div>
            </div>
        );

        const Docs = () => (
            <div className="max-w-3xl space-y-16">
                <section className="space-y-6">
                    <h2 className="text-2xl font-bold text-white tracking-tight border-b border-zinc-800 pb-4">Getting Started</h2>
                    <p className="text-[#52525b] leading-relaxed text-sm">
                        Skwiz ID is the foundational identity layer for the Skwiz ecosystem. It provides a secure interface for user authentication and authorization across distributed nodes.
                    </p>
                    <div className="grid grid-cols-2 gap-4">
                        <DocMetaCard label="Architecture" value="Decentralized / Sync" />
                        <DocMetaCard label="Standard" value="Skwiz-Auth-v1" />
                    </div>
                </section>

                <section className="space-y-6">
                    <div className="flex items-center gap-4">
                        <div className="w-8 h-8 rounded-full bg-[#4f46e5] text-white flex items-center justify-center font-black text-xs">01</div>
                        <h3 className="text-lg font-bold text-white">OAuth 2.0 Integration</h3>
                    </div>
                    <p className="text-[#52525b] text-sm leading-relaxed">
                        Applications must register a valid Client ID in the Developer Console. The authentication sequence begins by redirecting the client to our secure gateway.
                    </p>
                    <div className="bg-black p-5 rounded-lg border border-zinc-900 font-mono text-[10px] text-zinc-500">
                        https://accounts.skwiz.site/auth?client_id=<span className="text-white">[YOUR_ID]</span>&redirect_uri=<span className="text-white">[YOUR_URI]</span>
                    </div>
                </section>
            </div>
        );

        const DocMetaCard = ({ label, value }) => (
            <div className="p-4 bg-zinc-900/40 border border-zinc-800 rounded-lg">
                <h4 className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1">{label}</h4>
                <p className="text-[11px] text-zinc-300 italic font-mono uppercase tracking-tighter">{value}</p>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize icons after React render
        setTimeout(() => lucide.createIcons(), 500);
        // Refresh icons whenever currentView changes
        // (Handled by useEffect in components or global observer)
        const observer = new MutationObserver(() => lucide.createIcons());
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>

    <script type="text/babel">
        // This is where Babel would normally go if I used non-module Babel
    </script>
</body>
</html>
